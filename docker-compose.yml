services:
  postgres:
    image: postgres:16-alpine
    container_name: calledit-postgres
    environment:
      POSTGRES_USER: calledit
      POSTGRES_PASSWORD: calledit
      POSTGRES_DB: calledit
    ports:
      - '5432:5432'
    volumes:
      - calledit-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U calledit -d calledit']
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    container_name: calledit-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://calledit:calledit@postgres:5432/calledit
      # Live TxLINE feed + Solana settlement are optional for a local boot.
      # To enable them, drop the vars into a .env file and uncomment env_file below.
    # env_file:
    #   - .env
    ports:
      - '3000:3000'

volumes:
  calledit-pgdata:
