services:
  - type: web
    name: calledit-api
    runtime: node
    plan: starter
    buildCommand: pnpm install && pnpm build
    startCommand: pnpm migrate && pnpm start
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: calledit-db
          property: connectionString
      - key: NODE_ENV
        value: production
databases:
  - name: calledit-db
    plan: free
